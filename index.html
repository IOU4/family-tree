<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FamilyTree</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <div class="container">
      <h1>Fam</h1>
      <div id="people-grid" class="grid">
        {{range .people}}
        <div class="card">
          <p class="card-name">{{.FullName}}</p>
          <p class="card-detail">Age: {{.Age}}</p>
        </div>
        {{end}}
        <button class="add-btn" onclick="document.getElementById('add-form').classList.add('visible'); this.style.display='none'"> + </button>
        <form id="add-form" class="add-form"
          hx-post="/person" hx-target="#people-grid" hx-swap="outerHTML">
          <input name="first_name" placeholder="First name" required>
          <input name="last_name" placeholder="Last name" required>
          <input name="birthday" type="date" required>
          <select name="gender" required>
            <option value="1">Female</option>
            <option value="2">Male</option>
          </select>
          <button type="submit">Add</button>
        </form>
      </div>
    </div>
  </body>
</html>
