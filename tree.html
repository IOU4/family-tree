<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FamilyTree</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#030712',
              secondary: '#f9fafb'
            }
          }
        }
      }
  </script>
    <style type="text/tailwindcss">
      @layer base {
        {
          content-visibility: auto;
        }
      }
    </style>

  </head>
  <body>
    <section class="w-screen h-screen bg-secondary dark:bg-primary">
      <div class="mx-auto max-w-screen-xl px-4 py-32 lg:flex lg:h-screen lg:items-center">
        <div class="mx-auto max-w-xl text-center">
          <div class="flex flex-col items-center gap-4">
            <p class="border p-4">Me</p>
            <button class="group relative inline-block text-sm font-medium text-primary dark:text-secondary focus:outline-none focus:ring"
              hx-get="./members_buttons.html"
              hx-targer="#choseMember"
              hx-swap="outerHTML">
              <span class="absolute inset-0 translate-x-0.5 translate-y-0.5 bg-gray-800 dark:bg-gray-200 transition-transform group-hover:translate-x-0 group-hover:translate-y-0" ></span>
              <span class="relative block border border-current bg-secondary dark:bg-primary px-4 py-2">add</span>
            </button>
            <div id="choseMember"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
